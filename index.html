<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Breakout - 90s Retro Edition</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Neon Breakout</h1>

    <div id="stats">
        <div class="stat-box">Score: <span id="score">0000</span></div>
        <div class="stat-box">Lives: <span id="lives">3</span></div>
        <div class="stat-box">Coins: <span id="coins">0</span></div>
        <div id="shop" class="stat-box">
            <button id="buyBallBtn" class="shop-btn">Double Ball (10$)</button>
        </div>
        <div class="stat-box">Level: <span id="level">1</span></div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui-overlay" class="active">
            <h2 id="msg-title">READY?</h2>
            <button id="startBtn" class="btn">Start Game</button>
        </div>
    </div>

    <script src="game.js" defer></script>
</body>

</html>
